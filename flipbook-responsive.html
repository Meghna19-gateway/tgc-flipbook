<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Gateway Chronicles · Anniversary Edition</title>
<!--
  ============================================================================
  SINGLE-FILE FLIPBOOK TEMPLATE
  ----------------------------------------------------------------------------
  To update the book, DO NOT edit this file. Just change the images in /pages:
    pages/page-001.jpg, page-002.jpg, page-003.jpg ...  (sequential from 001)
  Supported: .jpg .jpeg .png .webp  (zero-padded "page-001" or plain "page-1")
  Add, remove, or replace pages freely — the flipbook auto-detects them on load.
  Optional settings are in the CONFIG block in the script below.
  ============================================================================
-->
<style>
  :root{ --bg1:#1a1d29; --bg2:#0e1016; --accent:#c9a14a; --txt:#e9e9ee;
    --bar:rgba(20,22,30,.82); --btn:rgba(255,255,255,.08); --btnh:rgba(255,255,255,.18); }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{background:radial-gradient(120% 120% at 50% 0%,var(--bg1) 0%,var(--bg2) 70%);
    font-family:"Segoe UI",system-ui,Helvetica,Arial,sans-serif;color:var(--txt);
    display:flex;flex-direction:column;height:100vh;}
  header{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:.6rem;
    padding:.55rem 1rem;font-weight:600;letter-spacing:.04em;font-size:.95rem;color:#f3ead1;
    text-shadow:0 1px 2px rgba(0,0,0,.4);}
  header .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);}
  #stage{flex:1 1 auto;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  #zoomWrap{transition:transform .25s ease;will-change:transform;}
  #book{box-shadow:0 30px 80px rgba(0,0,0,.55);}
  #book .page{background:#fff;} #book .page img{width:100%;height:100%;display:block;}
  #bar{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:.35rem;
    padding:.5rem .7rem;background:var(--bar);backdrop-filter:blur(10px);
    border-top:1px solid rgba(255,255,255,.06);}
  button.tool{display:inline-flex;align-items:center;justify-content:center;min-width:40px;height:40px;
    padding:0 .65rem;border:0;border-radius:10px;background:var(--btn);color:var(--txt);cursor:pointer;
    font-size:1.05rem;transition:background .15s,transform .1s;}
  button.tool:hover{background:var(--btnh);} button.tool:active{transform:scale(.93);}
  button.tool.on{background:var(--accent);color:#1a1208;}
  button.tool:disabled{opacity:.32;cursor:default;}
  #pageInfo{min-width:96px;text-align:center;font-variant-numeric:tabular-nums;font-size:.9rem;padding:0 .4rem;}
  .sep{width:1px;height:26px;background:rgba(255,255,255,.12);margin:0 .25rem;}
  #thumbs{position:absolute;inset:0;background:rgba(8,9,13,.92);backdrop-filter:blur(6px);display:none;
    grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:14px;padding:22px;overflow:auto;z-index:30;}
  #thumbs.open{display:grid;}
  #thumbs figure{cursor:pointer;text-align:center;transition:transform .12s;}
  #thumbs figure:hover{transform:translateY(-3px);}
  #thumbs img{width:100%;border-radius:6px;box-shadow:0 6px 18px rgba(0,0,0,.5);border:2px solid transparent;}
  #thumbs figure:hover img{border-color:var(--accent);}
  #thumbs figcaption{font-size:.72rem;color:#aab;margin-top:5px;}
  .hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:.72rem;
    color:rgba(255,255,255,.4);pointer-events:none;z-index:5;transition:opacity .6s;}
  #loader{position:absolute;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:1rem;background:var(--bg2);transition:opacity .5s;}
  #loader.hide{opacity:0;pointer-events:none;}
  .spin{width:44px;height:44px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--accent);
    border-radius:50%;animation:sp 1s linear infinite;} @keyframes sp{to{transform:rotate(360deg);}}
  #loader span{font-size:.85rem;color:#9aa;letter-spacing:.05em;}
  #msg{position:absolute;inset:0;display:none;align-items:center;justify-content:center;text-align:center;
    padding:2rem;color:#aab;font-size:.95rem;line-height:1.6;z-index:45;}
  #logo{position:absolute;left:24px;bottom:18px;height:72px;width:auto;opacity:.92;z-index:6;
    pointer-events:none;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5));}
  /* ---- mobile / narrow screens: single-page view ---- */
  @media (max-width:820px){
    header{font-size:.82rem;padding:.45rem .6rem;}
    #logo{height:46px;left:12px;bottom:12px;opacity:.85;}
    #bar{gap:.2rem;padding:.45rem .4rem;flex-wrap:wrap;}
    button.tool{min-width:36px;height:36px;font-size:1rem;}
    #pageInfo{min-width:auto;font-size:.82rem;}
    #thumbs{grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:10px;padding:14px;}
    #gutter{display:none;}
  }
  #gutter{position:absolute;pointer-events:none;z-index:7;opacity:0;transition:opacity .18s ease;
    background:linear-gradient(to right,
      rgba(0,0,0,0) 0%, rgba(0,0,0,.02) 34%, rgba(0,0,0,.07) 47%, rgba(0,0,0,.12) 50%,
      rgba(0,0,0,.07) 53%, rgba(0,0,0,.02) 66%, rgba(0,0,0,0) 100%);
    mix-blend-mode:multiply;}
</style>

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=";
  document.title = CONFIG.title; document.getElementById('hdrTitle').textContent = CONFIG.title;

  const stage=document.getElementById('stage'), bookEl=document.getElementById('book');
  let PAGES=[], TOTAL=0, RATIO=0.707, pageFlip=null;

  function tryLoad(url){ return new Promise(res=>{ const im=new Image();
    im.onload=()=>res({url,w:im.naturalWidth,h:im.naturalHeight}); im.onerror=()=>res(null); im.src=url; }); }

  async function detect(){
    const exts=['jpg','jpeg','png','webp']; const found=[]; let first=null;
    for(let i=1;i<=CONFIG.maxPages;i++){
      let hit=null;
      const names=[`page-${String(i).padStart(3,'0')}`,`page-${i}`,`${String(i).padStart(3,'0')}`,`${i}`];
      for(const nm of names){ for(const e of exts){
        const r=await tryLoad(`${CONFIG.pagesFolder}/${nm}.${e}`); if(r){hit=r;break;} } if(hit)break; }
      if(!hit) break;                 // pages are sequential from 001; stop at first gap
      if(!first) first=hit; found.push(hit.url);
    }
    if(found.length && CONFIG.ratio>0) RATIO=CONFIG.ratio;
    else if(first) RATIO=first.w/first.h;
    return found;
  }

  // single-page view on phones / narrow screens, two-page spread on larger screens
  function isMobile(){ return window.matchMedia('(max-width:820px)').matches; }
  function calcSize(){
    const availH=stage.clientHeight-24, availW=stage.clientWidth-24;
    if(isMobile()){                       // one page filling the available area
      let w=availW, h=w/RATIO; if(h>availH){ h=availH; w=h*RATIO; }
      return {w:Math.floor(w),h:Math.floor(h)};
    }
    let h=availH, w=h*RATIO; if(w*2>availW){ w=availW/2; h=w/RATIO; }
    return {w:Math.floor(w),h:Math.floor(h)};
  }

  function build(){
    const {w,h}=calcSize(); bookEl.innerHTML='';
    // HTML render mode: pages are real DOM elements (no white blank canvas fill).
    PAGES.forEach(src=>{ const d=document.createElement('div'); d.className='page';
      const im=document.createElement('img'); im.src=src; im.draggable=false; d.appendChild(im);
      bookEl.appendChild(d); });
    // showCover:true -> cover & back render as single pages (centered by us below)
    pageFlip=new St.PageFlip(bookEl,{width:w,height:h,size:'fixed',showCover:true,
      usePortrait:isMobile(),mobileScrollSupport:false,maxShadowOpacity:.5,drawShadow:true,
      flippingTime:750,swipeDistance:30,clickEventForward:true,useMouseEvents:true});
    pageFlip.loadFromHTML(bookEl.querySelectorAll('.page'));
    pageFlip.on('flip',e=>updateInfo(e.data));
    pageFlip.on('init',()=>{updateInfo(0);hideLoader();});
    pageFlip.on('changeState',e=>{
      if(e.data==='flipping') playFlip();
      const g=document.getElementById('gutter'); if(!g) return;
      // hide the spine shadow while a page is folding/turning; restore once settled
      if(e.data==='read') positionGutter(lastSingle); else g.style.opacity=0;
    });
  }

  // center the cover (right slot) and a lone last page (left slot); spreads stay put
  function centerView(idx){
    let tx=0;
    if(isMobile()){ bookEl.style.transform='translateX(0)'; return; }  // portrait: page already centered
    if(idx===0) tx=-25;                 // cover sits in the right half -> pull left to center
    else if(idx===TOTAL-1) tx=25;       // lone back page sits in left half -> push right to center
    bookEl.style.transition='transform .5s ease';
    bookEl.style.transform=`translateX(${tx}%)`;
  }
  // center spine shadow — shown on 2-page spreads, hidden on centered single pages.
  // positioned from the STAGE centre + the book's layout size (offsetWidth/Height),
  // which ignore the centering translate, so it isn't thrown off mid-slide.
  let lastSingle=true;
  function positionGutter(single){
    lastSingle=single;
    const g=document.getElementById('gutter'); if(!g) return;
    if(single||isMobile()){ g.style.opacity=0; return; }
    const s=stage.getBoundingClientRect();
    const bw=bookEl.offsetWidth*zoom, bh=bookEl.offsetHeight*zoom, gw=bw*0.12;
    g.style.top=((s.height-bh)/2)+'px'; g.style.height=bh+'px';
    g.style.left=((s.width-gw)/2)+'px'; g.style.width=gw+'px';
    g.style.opacity=1;
  }
  function updateInfo(idx){ const p=idx+1; centerView(idx); positionGutter(idx===0||idx===TOTAL-1);
    document.getElementById('pageInfo').textContent =
      (isMobile()||idx===0||idx===TOTAL-1)?`${p} / ${TOTAL}`:`${p}–${Math.min(p+1,TOTAL)} / ${TOTAL}`;
    document.getElementById('first').disabled=idx<=0; document.getElementById('prev').disabled=idx<=0;
    document.getElementById('next').disabled=idx>=TOTAL-1; document.getElementById('last').disabled=idx>=TOTAL-1; }

  // sound
  let soundOn=CONFIG.sound; const sndBtn=document.getElementById('sound');
  function playFlip(){ if(!soundOn) return; try{ const a=new Audio(FLIP_SND); a.volume=.5; a.play().catch(()=>{}); }catch(e){} }
  sndBtn.classList.toggle('on',soundOn);
  sndBtn.onclick=()=>{ soundOn=!soundOn; sndBtn.classList.toggle('on',soundOn);
    sndBtn.innerHTML=soundOn?'&#128266;':'&#128263;'; if(soundOn) playFlip(); };

  // nav
  document.getElementById('prev').onclick=()=>pageFlip.flipPrev();
  document.getElementById('next').onclick=()=>pageFlip.flipNext();
  document.getElementById('first').onclick=()=>pageFlip.flip(0);
  document.getElementById('last').onclick=()=>pageFlip.flip(TOTAL-1);
  // zoom
  let zoom=1; const zw=document.getElementById('zoomWrap');
  function az(){ zw.style.transform=`scale(${zoom})`; stage.style.overflow=zoom>1?'auto':'hidden'; positionGutter(lastSingle); }
  document.getElementById('zoomIn').onclick=()=>{zoom=Math.min(2.5,zoom+.25);az();};
  document.getElementById('zoomOut').onclick=()=>{zoom=Math.max(1,zoom-.25);az();};
  // fullscreen
  document.getElementById('full').onclick=()=>{ if(!document.fullscreenElement)
    document.documentElement.requestFullscreen?.(); else document.exitFullscreen?.(); };
  // keyboard
  addEventListener('keydown',e=>{ if(e.key==='ArrowRight')pageFlip?.flipNext();
    else if(e.key==='ArrowLeft')pageFlip?.flipPrev();
    else if(e.key==='Escape')document.getElementById('thumbs').classList.remove('open'); });
  // loader
  let loaderHidden=false;
  function hideLoader(){ if(loaderHidden)return; loaderHidden=true; const l=document.getElementById('loader');
    if(l){ l.classList.add('hide'); setTimeout(()=>l.remove(),600); } }
  setTimeout(hideLoader,9000);
  setTimeout(()=>{const h=document.getElementById('hint');if(h)h.style.opacity=0;},4500);

  // thumbnails (built after detection)
  function buildThumbs(){ const t=document.getElementById('thumbs');
    PAGES.forEach((src,i)=>{ const f=document.createElement('figure');
      f.innerHTML=`<img loading="lazy" src="${src}"><figcaption>${i+1}</figcaption>`;
      f.onclick=()=>{pageFlip.flip(i);t.classList.remove('open');}; t.appendChild(f); });
    document.getElementById('grid').onclick=()=>t.classList.toggle('open'); }

  // go
  (async()=>{
    PAGES=await detect(); TOTAL=PAGES.length;
    if(TOTAL===0){ hideLoader(); const m=document.getElementById('msg');
      m.style.display='flex'; m.innerHTML='No pages found.<br>Add <b>page-001.jpg</b>, <b>page-002.jpg</b>, &hellip; to the <b>'+CONFIG.pagesFolder+'</b> folder beside this file.'; return; }
    build(); buildThumbs();
    let rt; addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>{
      const cur=pageFlip?.getCurrentPageIndex?.()??0; build();
      setTimeout(()=>{pageFlip.turnToPage(cur); updateInfo(cur);},60); },250);});
  })();
  </script>
